<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="#0b0f14"/>

  <!-- Subtle grid -->
  <g stroke="#1f2933" stroke-width="1" opacity="0.4">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>

    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1050" y1="0" x2="1050" y2="300"/>
  </g>

  <!-- Title -->
  <text x="80" y="130"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="44"
        font-weight="700"
        fill="#e5e7eb">
    Designing Decentralized Systems
  </text>

  <!-- Subtitle -->
  <text x="80" y="175"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="20"
        font-weight="400"
        fill="#9ca3af">
    A systems-design reference for blockchain and Web3 architectures
  </text>

  <!-- Accent line -->
  <line x1="80" y1="195" x2="520" y2="195" stroke="#3b82f6" stroke-width="2"/>

  <!-- Footer text -->
  <text x="80" y="235"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="14"
        fill="#6b7280">
    First Principles • Tradeoffs • Trust Models • Failure Modes • Decentralized System Design Examples • Scaling • Security • More...
  </text>
</svg>
